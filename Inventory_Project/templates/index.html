<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Scanner - Chawla Enterprise</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #fff; text-align: center; padding: 20px; margin: 0; min-height: 100vh;}
        h2 { color: #00d2ff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0px 0px 10px rgba(0, 210, 255, 0.5); margin-bottom: 30px;}
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border: 3px solid #00d2ff; border-radius: 15px; background: #111; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); overflow: hidden;}
        #reader video { transform: scaleX(-1); }
        .manual-box { margin-top: 25px; padding: 20px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); max-width: 400px; margin: 0 auto;}
        input { padding: 12px; border-radius: 8px; border: 1px solid #00d2ff; background: rgba(0,0,0,0.5); color: #fff; width: 65%; font-size: 16px; text-align: center; outline: none;}
        button { padding: 12px 20px; border-radius: 8px; border: none; background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: white; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);}
        .log-box { background: #000; padding: 20px; margin-top: 30px; height: 250px; overflow-y: scroll; border-radius: 10px; border: 1px solid #333; text-align: left; font-family: monospace; font-size: 14px; box-shadow: inset 0 0 15px rgba(0,255,0,0.05);}
        .log-box h4 { color: #00d2ff; border-bottom: 1px dashed #333; padding-bottom: 10px; margin-top: 0;}
        #logs li { margin-bottom: 8px; color: #00ff00; list-style-type: none; text-shadow: 0 0 5px rgba(0, 255, 0, 0.3);}
    </style>
</head>
<body>
    <h2>Readymade POS - Smart Scanner</h2>
    
    <div id="reader">
        <div style="padding: 100px 0; color: #888;">[Camera Feed Area]</div>
    </div>

    <div class="manual-box">
        <p style="margin-top:0; color:#ccc;">Camera blur? Use Manual Entry:</p>
        <input type="text" id="manualCode" placeholder="Enter Barcode (e.g. 12345)">
        <br>
        <button onclick="sendManualCode()">Add to OS Buffer</button>
    </div>

    <div class="log-box">
        <h4>System Logs (OS Process Status):</h4>
        <ul id="logs">
            <li>> OS RAM Buffer Initialized. Capacity: 50</li>
        </ul>
    </div>

    <script>
        function logMessage(msg) {
            let logs = document.getElementById('logs');
            let li = document.createElement('li');
            li.textContent = msg;
            logs.appendChild(li);
            logs.scrollTop = logs.scrollHeight;
        }

        function sendManualCode() {
            let codeInput = document.getElementById('manualCode');
            let code = codeInput.value;
            if(code.trim() !== "") {
                fetch('/add_to_buffer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({barcode: code})
                })
                .then(res => res.json())
                .then(data => {
                    logMessage(`> Scanned: ${code}. Sent to RAM Queue. Buffer: ${data.buffer_size}/50`);
                    if(data.buffer_size >= 5) {
                        setTimeout(() => logMessage("> [OS Lock] Acquiring Mutex... Writing to DB..."), 500);
                        setTimeout(() => logMessage("> [DBMS] Batch Write & Trigger Completed. Buffer Reset."), 1500);
                    }
                });
                codeInput.value = ""; 
            } else {
                logMessage("> ⚠️ ERROR: Please enter a valid Barcode!"); 
            }
        }
    </script>
</body>
</html>
