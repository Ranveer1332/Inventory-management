<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Chawla Enterprise</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;}
        .login-box { background: rgba(0, 0, 0, 0.6); padding: 40px; border-radius: 15px; border: 1px solid #00d2ff; text-align: center; box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2); width: 320px;}
        h2 { color: #00d2ff; margin-bottom: 20px;}
        select, input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #00d2ff; background: rgba(0,0,0,0.5); color: white;}
        button { width: 100%; padding: 12px; background: linear-gradient(90deg, #00d2ff, #3a7bd5); border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px;}
        .error { color: #ff4757; font-size: 14px; margin-bottom: 10px;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Chawla Enterprise</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <select name="role">
                <option value="cashier">Cashier (Billing Desk)</option>
                <option value="owner">Super Admin (Owner)</option>
                <option value="inventory">Inventory Manager (Godown)</option> 
            </select>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Access System</button>
        </form>
    </div>
</body>
</html>
